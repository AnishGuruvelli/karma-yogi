  /friends/leaderboard:
    get:
      tags: [Friends]
      summary: Get weekly study leaderboard
      description: |
        Returns the caller and all confirmed friends ranked by minutes studied in the
        specified calendar week (Mondayâ€“Sunday UTC).

        Week selection (mutually exclusive; weekOffset takes precedence):
        - `weekOffset=0` (default) â€” current week
        - `weekOffset=-1` â€” previous week
        - `from` + `to` â€” explicit ISO date range
      security:
        - bearerAuth: []
      parameters:
        - name: weekOffset
          in: query
          description: Integer offset from current week (0 = this week, -1 = last week, etc.)
          schema:
            type: integer
            default: 0
        - name: from
          in: query
          description: Start of range (ISO date-time, UTC)
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          description: End of range (ISO date-time, UTC)
          schema:
            type: string
            format: date-time
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LeaderboardEntry'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /friends/sessions:
    post:
      tags: [Friends]
      summary: Create a shared study session for current user and friends
      description: |
        Logs a session for the caller using `subjectName`/`topic`, and logs a session for each
        friend in `friendIds`. Per-friend overrides (`perFriendPlans`) allow different subject/topic
        per friend while sharing the same session duration, mood, and start time.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                friendIds:
                  type: array
                  items:
                    type: string
                    format: uuid
                subjectName:
                  type: string
                  description: Subject name for the caller's session
                topic:
                  type: string
                  description: Topic for the caller's session
                perFriendPlans:
                  type: array
                  description: Optional per-friend subject/topic overrides
                  items:
                    type: object
                    properties:
                      friendId:
                        type: string
                        format: uuid
                      subjectName:
                        type: string
                      topic:
                        type: string
                    required: [friendId, subjectName, topic]
                durationMin:
                  type: integer
                  minimum: 1
                mood:
                  type: string
                  description: "\"1\" â€“ \"5\""
                startedAt:
                  type: string
                  format: date-time
              required: [friendIds, subjectName, topic, durationMin, mood, startedAt]
      responses:
        '201':
          description: Sessions created for all participants
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
