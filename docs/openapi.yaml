openapi: 3.0.3
info:
  title: Karma Yogi API
  version: 1.0.0
servers:
  - url: /api/v1
paths:
  /healthz:
    get:
      description: Service-level health endpoint exposed at server root (not under `/api/v1`).
  /auth/google:
    post:
      description: Exchange a Google ID token for an application session.
  /auth/dev-login:
    post:
      description: Development-only login helper that creates or reuses a user.
  /auth/register:
    post:
      description: Create an account using email, password, and secret answer.
  /auth/login:
    post:
      description: Authenticate using email and password.
  /auth/password-reset:
    post:
      description: Reset password by verifying email and secret answer.
  /auth/refresh:
    post:
      description: Rotate and issue a fresh access token from refresh credentials.
  /auth/logout:
    post:
      description: Revoke refresh session and end current authenticated session.
  /users/me:
    get:
      description: Retrieve current authenticated user profile.
    patch:
      description: Update editable profile fields for current authenticated user.
  /users/me/public-profile:
    get:
      description: Retrieve current user's public profile metadata fields.
    patch:
      description: Update current user's public profile metadata fields.
  /users/me/preferences:
    get:
      description: Retrieve current user's study, notification, and feature preferences (including whether StrategyDashboard is enabled).
    patch:
      description: Update current user's study, notification, and feature preferences (including StrategyDashboard visibility).
  /users/me/privacy:
    get:
      description: Retrieve current user's privacy and visibility settings.
    patch:
      description: Update current user's privacy and visibility settings.
  /users/me/achievements:
    get:
      description: |
        List derived profile achievements with earned flags and optional earnedAt timestamps.
        Streak rules use UTC calendar dates from session started_at; "today" is UTC (may differ from the app client's local streak by one day at zone boundaries).
  /users/me/study-stats:
    get:
      description: |
        Server-aggregated study statistics from all stored sessions (all-time totals and current-week minutes).
        Optional query `tz` is an IANA timezone name (e.g. `Asia/Kolkata`) used for distinct-day counts and the Monday–Sunday week window for `weekMinutesCurrent`; invalid values fall back to UTC.
  /users/{username}/public-profile:
    get:
      description: Retrieve privacy-aware public profile information for a user.
  /users/{username}/public-profile/details:
    get:
      description: |
        Retrieve full public profile details (overview, sessions, insights, heatmap).
        Access is restricted to the profile owner or confirmed friends; non-friends receive metadata with `canViewDetails=false`.
  /subjects:
    get:
      description: List all subjects for the current authenticated user.
    post:
      description: Create a new subject for the current authenticated user.
  /subjects/{id}:
    patch:
      description: Update color metadata for a subject owned by current user.
    delete:
      description: Delete a subject and any dependent user-owned records.
  /sessions:
    get:
      description: List all study sessions for current authenticated user.
    post:
      description: Create a new study session for current authenticated user.
  /sessions/{id}:
    patch:
      description: Update an existing study session owned by current user.
    delete:
      description: Delete a study session owned by current user.
  /goals:
    get:
      description: List goals configured for current authenticated user.
    post:
      description: Create a new study goal for current authenticated user.
  /goals/{id}:
    patch:
      description: Update a goal owned by current authenticated user.
    delete:
      description: Delete a goal owned by current authenticated user.
  /exam-goal:
    get:
      description: Retrieve current authenticated user's exam goal.
    put:
      description: Create or update current authenticated user's exam goal.
    delete:
      description: Delete current authenticated user's exam goal.
  /insights:
    get:
      description: Retrieve aggregated insights for current authenticated user.
  /timer-state:
    get:
      description: Fetch persisted timer state for current authenticated user.
    put:
      description: Create or update persisted timer state for current user.
    delete:
      description: Clear persisted timer state for current authenticated user.
  /timer-state/start:
    post:
      description: Returns server-authoritative timer start timestamp.
  /friends/users:
    get:
      description: List discoverable users with friendship relation status.
  /friends:
    get:
      description: List confirmed friends for current authenticated user.
  /friends/requests/incoming:
    get:
      description: List pending incoming friend requests.
  /friends/requests/outgoing:
    get:
      description: List pending outgoing friend requests.
  /friends/requests:
    post:
      description: Send a friend request to another user.
  /friends/requests/{id}/accept:
    post:
      description: Accept an incoming friend request by request id.
  /friends/requests/{id}/reject:
    post:
      description: Reject an incoming friend request by request id.
  /friends/leaderboard:
    get:
      description: Get weekly leaderboard among current user and confirmed friends.
  /friends/sessions:
    post:
      description: Create shared friend sessions for current user and selected friends.
