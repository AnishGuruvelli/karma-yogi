        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /friends/friend-profile:
    post:
      tags: [Friends]
      summary: Get full friend profile details (overview, sessions, insights, heatmap)
      description: |
        Returns rich profile details including overview stats, paginated sessions,
        subject insights, and a daily heatmap.

        Access rules:
        - The response always includes `user`, `profile`, `privacy`, `canViewDetails`.
        - `overview`, `sessions`, `insights`, `heatmap` are only populated when
          `canViewDetails = true` (caller is the profile owner or a confirmed friend).
        - Privacy settings further gate `stats` visibility.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  description: Username or user ID of the profile to fetch
                page:
                  type: integer
                  default: 1
                limit:
                  type: integer
                  default: 20
              required: [username]
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicProfileDetails'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

