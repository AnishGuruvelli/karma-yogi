openapi: 3.0.3
info:
  title: Karma Yogi API
  version: 2.0.0
  description: |
    REST API for Karma Yogi â€” a study-tracking platform.

    ## Auth model
    - Short-lived JWT **access tokens** (default 15 min, env `JWT_ACCESS_TTL_MINUTES`).
    - Long-lived rotating **refresh tokens** (default 720 h / 30 days, env `JWT_REFRESH_TTL_HOURS`).
    - All authenticated routes require `Authorization: Bearer <accessToken>`.
    - On 401 the client should call `POST /auth/refresh`. The server rotates the refresh token on every
      call (issues a new `refreshId` + `refreshToken` and revokes the old one).
    - **Concurrent 401 handling:** the frontend uses a single shared in-flight promise so parallel
      expired-token requests trigger only one refresh, preventing rotation races.

    ## Rate limiting
    180 requests / minute per IP (sliding window, applied globally).

    ## Client headers
    | Header | Description |
    |--------|-------------|
    | `X-Client-Platform` | `web` / `android` / `ios` |
    | `X-App-Version` | optional semver string |

servers:
  - url: /api/v1
    description: All API routes. Note â€” `GET /healthz` lives at the **server root**, not under `/api/v1`.

tags:
  - name: Health
  - name: Auth
  - name: Users
  - name: Profile
  - name: Preferences
  - name: Privacy
  - name: Achievements
  - name: Subjects
  - name: Sessions
  - name: Goals
  - name: Exam Goal
  - name: Insights
  - name: Timer
  - name: Friends

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
      required: [error]

    AuthResult:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        accessToken:
          type: string
        refreshId:
          type: string
          format: uuid
        refreshToken:
          type: string
      required: [user, accessToken, refreshId, refreshToken]

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        fullName:
          type: string
        username:
          type: string
        phone:
          type: string
        avatarUrl:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, email, fullName, username]

    Subject:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        color:
          type: string
          enum: [cyan, green, orange, pink, purple]
        icon:
          type: string
          description: Emoji or icon identifier, may be empty
        createdAt:
          type: string
          format: date-time
      required: [id, name, color, createdAt]

    Session:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        subjectId:
          type: string
          format: uuid
        topic:
          type: string
        durationMin:
          type: integer
          minimum: 1
        mood:
          type: string
          description: Mood rating as a string "1"â€“"5"
        startedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
      required: [id, subjectId, durationMin, startedAt]

    Goal:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        title:
          type: string
        targetMinutes:
          type: integer
          minimum: 1
        deadline:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, title, targetMinutes, deadline]

    ExamGoalWrapper:
      type: object
      properties:
        examGoal:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/ExamGoal'
      required: [examGoal]

    ExamGoal:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        examDate:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, examDate]

    UserPublicProfile:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        bio:
          type: string
        location:
          type: string
        education:
          type: string
        occupation:
          type: string
        targetExam:
          type: string
        targetCollege:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [userId]

    UserPreferences:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        preferredStudyTime:
          type: string
          description: e.g. "Morning", "Evening"
        defaultSessionMinutes:
          type: integer
          default: 50
        breakMinutes:
          type: integer
          default: 10
        pomodoroCycles:
          type: integer
          default: 4
        studyLevel:
          type: string
          description: e.g. "Beginner", "Intermediate", "Advanced"
        weeklyGoalHours:
          type: integer
          default: 20
        emailNotifications:
          type: boolean
        pushNotifications:
          type: boolean
        reminderNotifications:
          type: boolean
        marketingNotifications:
          type: boolean
        showStrategyPage:
          type: boolean
          description: When true, the Strategy Dashboard feature is enabled for this account
      required: [userId]

    UserPrivacySettings:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        profilePublic:
          type: boolean
        showStats:
          type: boolean
        showLeaderboard:
          type: boolean
      required: [userId, profilePublic, showStats, showLeaderboard]

    Achievement:
      type: object
      properties:
        key:
          type: string
          enum:
            - seven_day_streak
            - fourteen_day_warrior
            - century_club
            - first_session
            - deep_work
            - social_studier
            - subject_master
            - goal_crusher
            - early_bird
            - mock_master
        earned:
          type: boolean
        earnedAt:
          type: string
          format: date-time
          nullable: true
      required: [key, earned]

    AchievementsResponse:
      type: object
      properties:
        achievements:
          type: array
          items:
            $ref: '#/components/schemas/Achievement'
      required: [achievements]

    StudyStatsSummary:
      type: object
      properties:
        totalMinutes:
          type: integer
        totalSessions:
          type: integer
        avgSessionMinutes:
          type: integer
        longestSessionMinutes:
          type: integer
        avgMood:
          type: number
          format: float
        activeDistinctDays:
          type: integer
        weekMinutesCurrent:
          type: integer
          description: Minutes studied in the current Mondayâ€“Sunday week (in timezoneUsed)
        timezoneUsed:
          type: string
          description: IANA timezone used for week/day calculations
      required: [totalMinutes, totalSessions, avgSessionMinutes, longestSessionMinutes, avgMood, activeDistinctDays, weekMinutesCurrent, timezoneUsed]

    Insights:
      type: object
      properties:
        totalMinutes:
          type: integer
        sessionCount:
          type: integer
        weeklyMinutes:
          type: integer
        goalCompletion:
          type: integer
          description: Percentage 0â€“100

    PublicProfileStats:
      type: object
      properties:
        totalMinutes:
          type: integer
        totalSessions:
          type: integer
        activeDays:
          type: integer
        avgSessionMinutes:
          type: integer
        longestSession:
          type: integer
        thisWeekMinutes:
          type: integer
        friendCount:
          type: integer

    PublicProfileView:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        profile:
          $ref: '#/components/schemas/UserPublicProfile'
        privacy:
          $ref: '#/components/schemas/UserPrivacySettings'
        stats:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/PublicProfileStats'
          description: Only present when showStats is true and profilePublic is true
      required: [user, profile, privacy]

    PublicProfileOverview:
      type: object
      properties:
        totalMinutes:
          type: integer
        totalSessions:
          type: integer
        activeDays:
          type: integer
        avgSessionMinutes:
          type: integer
        longestSession:
          type: integer
        thisWeekMinutes:
          type: integer
        friendCount:
          type: integer
        currentStreakDays:
          type: integer
        maxStreakDays:
          type: integer
        weeklyGoalHours:
          type: integer
        avgMood:
          type: number
          format: float

    PublicProfileSession:
      type: object
      properties:
        id:
          type: string
          format: uuid
        subjectId:
          type: string
          format: uuid
        subjectName:
          type: string
        topic:
          type: string
        durationMin:
          type: integer
        mood:
          type: string
        startedAt:
          type: string
          format: date-time

    PublicProfileInsightsBucket:
      type: object
      properties:
        dateKey:
          type: string
          description: "YYYY-MM-DD"
        minutes:
          type: integer

    PublicProfileInsightsSubject:
      type: object
      properties:
        subjectId:
          type: string
          format: uuid
        subjectName:
          type: string
        minutes:
          type: integer

    PublicProfileInsights:
      type: object
      properties:
        dailyMinutes:
          type: array
          items:
            $ref: '#/components/schemas/PublicProfileInsightsBucket'
        weeklyMinutes:
          type: array
          items:
            $ref: '#/components/schemas/PublicProfileInsightsBucket'
        subjectBreakdown:
          type: array
          items:
            $ref: '#/components/schemas/PublicProfileInsightsSubject'
        peakHourLocal:
          type: integer
          description: Hour of day (0â€“23) with the most study minutes
        peakHourMinutes:
          type: integer
        bestDayDateKey:
          type: string
        bestDayMinutes:
          type: integer
        mostStudiedSubject:
          type: string

    PublicProfileDetails:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        profile:
          $ref: '#/components/schemas/UserPublicProfile'
        privacy:
          $ref: '#/components/schemas/UserPrivacySettings'
        canViewDetails:
          type: boolean
          description: True for the profile owner or confirmed friends; false otherwise
        overview:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/PublicProfileOverview'
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/PublicProfileSession'
          nullable: true
        sessionsTotal:
          type: integer
        sessionsHasMore:
          type: boolean
        insights:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/PublicProfileInsights'
        heatmap:
          type: object
          additionalProperties:
            type: integer
          description: "Map of YYYY-MM-DD â†’ minutes studied"
          nullable: true
      required: [user, profile, privacy, canViewDetails, sessionsTotal, sessionsHasMore]

    FriendUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        fullName:
          type: string
        username:
          type: string
        friendshipStatus:
          type: string
          enum: [none, incoming, outgoing, friends]
      required: [id, fullName, username, friendshipStatus]

    FriendRequest:
      type: object
      properties:
        id:
          type: string
          format: uuid
        senderId:
          type: string
          format: uuid
        receiverId:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, accepted, rejected]
        createdAt:
          type: string
          format: date-time
        respondedAt:
          type: string
          format: date-time
          nullable: true
      required: [id, senderId, receiverId, status, createdAt]

    LeaderboardEntry:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        fullName:
          type: string
        username:
          type: string
        weeklyMinutes:
          type: integer
      required: [userId, fullName, username, weeklyMinutes]

    TimerState:
      type: object
      description: |
        Free-form JSON blob persisted per user. Common fields used by the frontend:
        - `mode`: "stopwatch" | "pomodoro"
        - `timerType`: "solo" | "friend"
        - `subjectId`: UUID
        - `topic`: string
        - `isRunning`: boolean
        - `isPaused`: boolean
        - `hasStarted`: boolean
        - `friendIds`: string[] (for friend sessions)
        - `sessionMode`: "live" | "plan"
      additionalProperties: true

    TimerStateResponse:
      type: object
      properties:
        state:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/TimerState'
      required: [state]

  responses:
    Unauthorized:
      description: Missing or invalid access token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    BadRequest:
      description: Invalid request body or parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

security: []

paths:
  /healthz:
    get:
      tags: [Health]
      summary: Health check
      description: |
        Service liveness probe. Exposed at the **server root** (`GET /healthz`),
        not under `/api/v1`. Returns `{"status":"ok"}` when the API is up.

        > Via default Nginx config `http://localhost/api/healthz` returns 404 â€” use the direct API URL `http://localhost:8080/healthz`.
      servers:
        - url: /
          description: Server root (not under /api/v1)
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /auth/register:
    post:
      tags: [Auth]
      summary: Register with email + password
      description: |
        Creates a new account. The `secretAnswer` is used for password reset; the client displays
        a single standard security question (see `frontend/src/lib/auth-constants.ts`).
        The answer is stored as a bcrypt hash.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                fullName:
                  type: string
                  minLength: 2
                password:
                  type: string
                  minLength: 8
                secretAnswer:
                  type: string
                  minLength: 2
              required: [email, fullName, password, secretAnswer]
      responses:
        '200':
          description: Account created; tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Email already registered

  /auth/login:
    post:
      tags: [Auth]
      summary: Login with email + password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
              required: [email, password]
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResult'
        '401':
          description: Invalid email or password

  /auth/password-reset:
    post:
      tags: [Auth]
      summary: Reset password via security answer
      description: |
        Does not require an authenticated session. Verifies the account's secret answer
        (bcrypt compare) then updates the password hash.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                secretAnswer:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
              required: [email, secretAnswer, newPassword]
      responses:
        '200':
          description: Password updated
        '401':
          description: Email or secret answer incorrect

  /auth/google:
    post:
      tags: [Auth]
      summary: Login or register via Google ID token
      description: |
        Exchange a Google Identity Services ID token for an application session.
        The backend verifies the token signature against Google's public keys using the
        configured `GOOGLE_CLIENT_ID`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
                  description: Google ID token from GIS `credential` callback
              required: [token]
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResult'
        '401':
          description: Token verification failed

  /auth/dev-login:
    post:
      tags: [Auth]
      summary: Development-only login helper
      description: |
        Creates or reuses a user with the given email (defaults to `dev@karmayogi.local`).
        **Intended for local development only** â€” disable or block in production.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Dev session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResult'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate refresh token and issue new access token
      description: |
        Validates `refreshToken` against the stored bcrypt hash for `refreshId`, revokes the
        existing refresh token, and issues a new access token + fresh refresh token pair.
        **One-shot:** using a revoked token returns 401.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshId:
                  type: string
                  format: uuid
                refreshToken:
                  type: string
              required: [refreshId, refreshToken]
      responses:
        '200':
          description: New token pair issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResult'
        '401':
          description: Refresh token expired, revoked, or hash mismatch

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout and revoke refresh session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshId:
                  type: string
                  format: uuid
              required: [refreshId]
      responses:
        '200':
          description: Session revoked

  /users/me:
    get:
      tags: [Users]
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Authenticated user object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      tags: [Users]
      summary: Update current user profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName:
                  type: string
                username:
                  type: string
                phone:
                  type: string
                avatarUrl:
                  type: string
      responses:
        '200':
          description: Updated user object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/me/public-profile:
    get:
      tags: [Profile]
      summary: Get my public profile metadata
      security:
        - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPublicProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      tags: [Profile]
      summary: Update my public profile metadata
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                bio:
                  type: string
                location:
                  type: string
                education:
                  type: string
                occupation:
                  type: string
                targetExam:
                  type: string
                targetCollege:
                  type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPublicProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/me/preferences:
    get:
      tags: [Preferences]
      summary: Get my study and notification preferences
      security:
        - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPreferences'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      tags: [Preferences]
      summary: Update my preferences
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                preferredStudyTime:
                  type: string
                defaultSessionMinutes:
                  type: integer
                breakMinutes:
                  type: integer
                pomodoroCycles:
                  type: integer
                studyLevel:
                  type: string
                weeklyGoalHours:
                  type: integer
                emailNotifications:
                  type: boolean
                pushNotifications:
                  type: boolean
                reminderNotifications:
                  type: boolean
                marketingNotifications:
                  type: boolean
                showStrategyPage:
                  type: boolean
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPreferences'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/me/privacy:
    get:
      tags: [Privacy]
      summary: Get my privacy and visibility settings
      security:
        - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPrivacySettings'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      tags: [Privacy]
      summary: Update my privacy settings
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                profilePublic:
                  type: boolean
                showStats:
                  type: boolean
                showLeaderboard:
                  type: boolean
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPrivacySettings'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/me/achievements:
    get:
      tags: [Achievements]
      summary: List profile achievements with earned status
      description: |
        Returns all achievement keys with `earned: true/false` and optional `earnedAt` timestamp.
        Achievements are derived from sessions and friend data â€” not stored separately.

        **Streak rules:** day boundaries use UTC calendar dates from `session.startedAt`.

        | Key | Condition |
        |-----|-----------|
        | `first_session` | At least 1 session logged |
        | `seven_day_streak` | 7-day consecutive study streak |
        | `fourteen_day_warrior` | 14-day consecutive study streak |
        | `century_club` | 100+ sessions logged |
        | `deep_work` | Any single session â‰Ą 120 minutes |
        | `social_studier` | At least 1 confirmed friend |
        | `subject_master` | Sessions across 5+ distinct subjects |
        | `goal_crusher` | Weekly goal reached at least once |
        | `early_bird` | Session starting before 07:00 local time |
        | `mock_master` | Session with "mock" in the topic |
      security:
        - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AchievementsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/me/study-stats:
    get:
      tags: [Users]
      summary: Get aggregated study statistics
      description: |
        Server-side aggregation of all stored sessions. Returns all-time totals and the
        current Mondayâ€“Sunday week in the requested timezone.
      security:
        - bearerAuth: []
      parameters:
        - name: tz
          in: query
          description: IANA timezone (e.g. `Asia/Kolkata`). Falls back to UTC if invalid or omitted.
          schema:
            type: string
            example: Asia/Kolkata
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudyStatsSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/{username}/public-profile:
    get:
      tags: [Profile]
      summary: Get public profile by username (privacy-aware)
      description: |
        Returns public profile data subject to the user's privacy settings.
        - `stats` is omitted when `privacy.showStats = false`
        - Non-public profiles still return the user object (for display) but omit stats
      security:
        - bearerAuth: []
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
