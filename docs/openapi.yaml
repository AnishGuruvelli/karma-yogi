openapi: 3.0.3
info:
  title: Karma Yogi API
  version: 1.0.0
servers:
  - url: /api/v1
paths:
  /auth/google:
    post:
      summary: Exchange Google ID token for app session tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  description: Google ID token (JWT) from Google Identity Services
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "401":
          description: Unauthorized
  /auth/register:
    post:
      summary: Register with email/password + standard security answer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, secretAnswer]
              properties:
                email:
                  type: string
                  format: email
                fullName:
                  type: string
                password:
                  type: string
                  minLength: 8
                secretAnswer:
                  type: string
                  description: Answer to the standard security question (client displays the prompt)
      responses:
        "200":
          description: Registered and authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "400":
          description: Validation error
  /auth/login:
    post:
      summary: Login with email/password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "401":
          description: Invalid credentials (or password login not enabled)
  /auth/password-reset:
    post:
      summary: Reset password using email + security answer (no email delivery)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, secretAnswer, newPassword]
              properties:
                email:
                  type: string
                  format: email
                secretAnswer:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
        "400":
          description: |
            Unable to reset. Common `error` values:
            - `incorrect email or security answer` (includes unknown email to avoid account enumeration)
            - `this account uses google sign-in; password reset is not available`
            - `this account does not have a security answer on file; create a new account or contact support`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
  /auth/refresh:
    post:
      summary: Rotate and refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshId, refreshToken]
              properties:
                refreshId:
                  type: string
                refreshToken:
                  type: string
      responses:
        "200":
          description: Refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "401":
          description: Unauthorized
  /auth/logout:
    post:
      summary: Revoke refresh token session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshId]
              properties:
                refreshId:
                  type: string
      responses:
        "200":
          description: Logged out
  /users/me:
    get:
      summary: Fetch authenticated user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Profile
  /sessions:
    get:
      summary: List sessions
      security:
        - bearerAuth: []
    post:
      summary: Create session
      security:
        - bearerAuth: []
  /sessions/{id}:
    patch:
      summary: Update session
      security:
        - bearerAuth: []
  /subjects:
    get:
      summary: List subjects
      security:
        - bearerAuth: []
    post:
      summary: Create subject
      security:
        - bearerAuth: []
  /subjects/{id}:
    delete:
      summary: Delete subject
      security:
        - bearerAuth: []
  /goals:
    get:
      summary: List goals
      security:
        - bearerAuth: []
    post:
      summary: Create goal
      security:
        - bearerAuth: []
  /insights:
    get:
      summary: Fetch user insights snapshot
      security:
        - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        fullName:
          type: string
        username:
          type: string
        phone:
          type: string
        avatarUrl:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    AuthResult:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        accessToken:
          type: string
        refreshId:
          type: string
        refreshToken:
          type: string
    ErrorBody:
      type: object
      properties:
        error:
          type: string
